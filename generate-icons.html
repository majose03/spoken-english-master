<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate PWA Icons</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
    .controls { margin-bottom: 20px; }
    .preview { display: flex; flex-wrap: wrap; gap: 10px; margin-top:20px; }
    canvas { background: white; border: 1px solid #ccc; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>PWA Icon Generator</h1>
  <p>Run locally to generate your icons, then save them into the `icons` directory.</p>
  <div class="controls">
    <button onclick="generateAll()">Generate All Sizes</button>
  </div>
  <div id="container" class="preview"></div>

  <script>
    const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
    const container = document.getElementById('container');

    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const r = size * 0.22;

      // Rounded rect background
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();

      // Gradient
      const grad = ctx.createLinearGradient(0, 0, size, size);
      grad.addColorStop(0, '#6C63FF');
      grad.addColorStop(0.5, '#FF6584');
      grad.addColorStop(1, '#43E97B');
      ctx.fillStyle = grad;
      ctx.fill();

      // Text (emoji)
      ctx.fillStyle = "white";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `bold ${size * 0.5}px "Playfair Display", serif`;
      ctx.shadowColor = "rgba(0,0,0,0.3)";
      ctx.shadowBlur = size * 0.05;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = size * 0.02;
      ctx.fillText("📚", size/2, size/2);

      return canvas;
    }

    function generateAll() {
      container.innerHTML = '';
      sizes.forEach(size => {
        const canvas = drawIcon(size);
        const wrapper = document.createElement('div');
        wrapper.style.display = 'flex';
        wrapper.style.flexDirection = 'column';
        wrapper.style.alignItems = 'center';
        
        const btn = document.createElement('button');
        btn.textContent = `Download ${size}x${size}`;
        btn.style.marginTop = '8px';
        btn.onclick = () => {
          const a = document.createElement('a');
          a.download = `icon-${size}.png`;
          a.href = canvas.toDataURL('image/png');
          a.click();
        };

        wrapper.appendChild(canvas);
        wrapper.appendChild(btn);
        container.appendChild(wrapper);
      });
    }

    generateAll();
  </script>
</body>
</html>
